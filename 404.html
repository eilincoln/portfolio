<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 | Rota Não Encontrada — Lincoln Berto</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">

  <!-- Aplica o tema salvo ANTES da renderização, evitando flash de tela clara -->
  <script>
    (function () {
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>

  <link rel="stylesheet" href="css/main.css">
  <style>
    .error-page {
      max-width: var(--max-width);
      margin: 0 auto;
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      text-align: left;
    }

    .error-code {
      font-family: var(--font-geek);
      font-size: 6rem;
      font-weight: bold;
      color: var(--accent-color);
      line-height: 1;
      margin-bottom: 10px;
    }

    .error-log {
      font-family: var(--font-geek);
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .error-log span {
      color: var(--primary-color);
      font-weight: bold;
    }
  </style>
</head>

<body>

  <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

  <header class="header">
    <div class="logo">LB</div>

    <div class="header-right">
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="sobre.html">Sobre</a>
        <a href="servicos.html">Serviços</a>
        <a href="projetos.html">Projetos</a>
        <a href="index.html#contact">Contato</a>
      </nav>
      <button class="theme-toggle" aria-label="Alternar tema claro/escuro">🌙</button>
      <button class="menu-toggle" aria-label="Abrir Menu">☰</button>
    </div>
  </header>

  <main id="main-content">
    <section class="error-page">
      <div class="error-code">404</div>
      <p class="error-log">
        <span>Error 404:</span> Rota Não Encontrada.<br>
        O sistema não localizou o endpoint solicitado no servidor.
      </p>
      <a href="index.html" class="btn btn-primary">Retornar_Ao_Sistema()</a>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <p>&copy; 2026 Lincoln Berto. Feito com lógica, foco e simplicidade.</p>
      <p class="footer-terminal">⚡ console.log("Obrigado pela visita.");</p>
    </div>
  </footer>
  <script type="module" src="js/main.js"></script>
</body>

</html>
